<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcul — Addition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    #app { width: 100%; max-width: 480px; }
    .score-bar { display: flex; gap: 12px; margin-bottom: 2rem; }
    .score-card { flex: 1; background: #ebebea; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; }
    .score-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
    .score-val { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .question-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; padding: 1.5rem 1.25rem; margin-bottom: 1.5rem; }
    .level-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .level-btn { font-size: 12px; padding: 4px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.3); background: transparent; color: #888780; cursor: pointer; }
    .level-btn.active { background: #dbeeff; color: #185fa5; border-color: transparent; }
    .equation { font-size: 32px; font-weight: 500; color: #1a1a18; text-align: center; margin: 1.5rem 0; letter-spacing: 2px; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    #answer { font-size: 22px; text-align: center; flex: 1; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.3); padding: 0.5rem; background: #fff; color: #1a1a18; }
    #answer:focus { outline: none; box-shadow: 0 0 0 2px #85b7eb; }
    #submit-btn { padding: 0.5rem 1.25rem; font-size: 15px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.3); background: transparent; color: #1a1a18; cursor: pointer; }
    #submit-btn:hover { background: #ebebea; }
    .feedback { text-align: center; font-size: 15px; min-height: 24px; margin-top: 1rem; font-weight: 500; }
    .feedback.correct { color: #3b6d11; }
    .feedback.wrong { color: #a32d2d; }
    .progress-wrap { margin-top: 1.5rem; }
    .progress-label { font-size: 12px; color: #888780; margin-bottom: 6px; }
    .progress-bar { height: 6px; background: #ebebea; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #639922; border-radius: 3px; transition: width 0.4s; }
    .history { margin-top: 1.5rem; }
    .history-title { font-size: 13px; color: #888780; margin-bottom: 8px; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 10px; border-radius: 8px; background: #ebebea; }
    .hist-eq { color: #888780; }
    .hist-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
    .hist-badge.ok { background: #eaf3de; color: #3b6d11; }
    .hist-badge.ko { background: #fcebeb; color: #a32d2d; }
  </style>
</head>
<body>
<div id="app">
  <div class="score-bar">
    <div class="score-card"><div class="score-label">Bonnes</div><div class="score-val" id="sc-good">0</div></div>
    <div class="score-card"><div class="score-label">Mauvaises</div><div class="score-val" id="sc-bad">0</div></div>
    <div class="score-card"><div class="score-label">Série</div><div class="score-val" id="sc-streak">0</div></div>
  </div>

  <div class="question-card">
    <div class="level-row" id="levels">
      <button class="level-btn active" data-level="1">Facile</button>
      <button class="level-btn" data-level="2">Moyen</button>
      <button class="level-btn" data-level="3">Difficile</button>
    </div>
    <div class="equation" id="eq">? + ? = ?</div>
    <div class="input-row">
      <input type="number" id="answer" placeholder="Ta réponse…" autocomplete="off" />
      <button id="submit-btn">Valider</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label" id="prog-label">0 / 10 exercices</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="history" id="history" style="display:none;">
    <div class="history-title">Dernières réponses</div>
    <div class="history-list" id="hist-list"></div>
  </div>
</div>

<script>
  let level = 1, correct = 0, wrong = 0, streak = 0, total = 0;
  let a, b, currentAnswer;
  const MAX = 10;

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function newQuestion() {
    if (level === 1) { a = rand(1, 20); b = rand(1, 20); }
    else if (level === 2) { a = rand(10, 99); b = rand(10, 99); }
    else { a = rand(100, 999); b = rand(100, 999); }
    currentAnswer = a + b;
    document.getElementById('eq').textContent = a + ' + ' + b + ' = ?';
    document.getElementById('answer').value = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('answer').focus();
  }

  function updateStats() {
    document.getElementById('sc-good').textContent = correct;
    document.getElementById('sc-bad').textContent = wrong;
    document.getElementById('sc-streak').textContent = streak + (streak >= 3 ? ' 🔥' : '');
    const pct = Math.min(Math.round((total / MAX) * 100), 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent = Math.min(total, MAX) + ' / ' + MAX + ' exercices';
  }

  function addHistory(eq, ok) {
    const list = document.getElementById('hist-list');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = '<span class="hist-eq">' + eq + '</span><span class="hist-badge ' + (ok ? 'ok' : 'ko') + '">' + (ok ? '✓ correct' : '✗ faux') + '</span>';
    list.insertBefore(item, list.firstChild);
    if (list.children.length > 5) list.removeChild(list.lastChild);
    document.getElementById('history').style.display = 'block';
  }

  function submit() {
    const val = document.getElementById('answer').value.trim();
    if (val === '') return;
    const guess = parseInt(val, 10);
    const eq = a + ' + ' + b + ' = ' + currentAnswer;
    total++;
    if (guess === currentAnswer) {
      correct++; streak++;
      document.getElementById('feedback').textContent = streak >= 3 ? 'Excellent ! Série de ' + streak + ' !' : 'Bonne réponse !';
      document.getElementById('feedback').className = 'feedback correct';
      addHistory(eq, true);
      updateStats();
      setTimeout(newQuestion, 900);
    } else {
      wrong++; streak = 0;
      document.getElementById('feedback').textContent = 'Pas tout à fait… La réponse était ' + currentAnswer;
      document.getElementById('feedback').className = 'feedback wrong';
      addHistory(eq, false);
      updateStats();
      setTimeout(newQuestion, 1600);
    }
  }

  document.getElementById('submit-btn').addEventListener('click', submit);
  document.getElementById('answer').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  document.getElementById('levels').addEventListener('click', e => {
    const btn = e.target.closest('.level-btn');
    if (!btn) return;
    level = parseInt(btn.dataset.level);
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    correct = wrong = streak = total = 0;
    updateStats();
    document.getElementById('history').style.display = 'none';
    document.getElementById('hist-list').innerHTML = '';
    newQuestion();
  });

  newQuestion();
</script>
</body>
</html>
